{{- if .Values.initJob.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vault.fullname" . }}-init
  labels:
    {{- include "vault.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vault.fullname" . }}-init
  labels:
    {{- include "vault.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vault.fullname" . }}-init
  labels:
    {{- include "vault.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vault.fullname" . }}-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vault.fullname" . }}-init
{{- end }}
