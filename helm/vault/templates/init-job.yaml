{{- if .Values.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vault.fullname" . }}-init
  labels:
    {{- include "vault.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.initJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "vault.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: vault-init
          image: "{{ .Values.initJob.image.repository }}:{{ .Values.initJob.image.tag }}"
          imagePullPolicy: {{ .Values.initJob.image.pullPolicy }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.initJob.vaultAddr | quote }}
            - name: KEY_SHARES
              value: {{ .Values.initJob.init.keyShares | quote }}
            - name: KEY_THRESHOLD
              value: {{ .Values.initJob.init.keyThreshold | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              i=0
              until vault status >/tmp/vault-status.txt 2>/tmp/vault-status.err; do
                i=$((i+1))
                if [ "$i" -ge {{ .Values.initJob.wait.retries }} ]; then
                  echo "Vault is not reachable after {{ .Values.initJob.wait.retries }} attempts"
                  cat /tmp/vault-status.err || true
                  exit 1
                fi
                echo "Waiting for Vault at ${VAULT_ADDR}..."
                sleep {{ .Values.initJob.wait.sleepSeconds }}
              done

              if vault status 2>/tmp/status.err | grep -q 'Initialized[[:space:]]*true'; then
                echo "Vault already initialized"
                exit 0
              fi

              echo "Initializing Vault..."
              vault operator init \
                -key-shares="${KEY_SHARES}" \
                -key-threshold="${KEY_THRESHOLD}" \
                -format=json
          resources:
            {{- toYaml .Values.initJob.resources | nindent 12 }}
{{- end }}
